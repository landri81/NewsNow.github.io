<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewzNow — Actualité mondiale en direct</title>
<meta name="description" content="NewzNow — Fil d'actualité mondial en temps réel, gratuit et automatique.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080b;--s2:#171a26;--bd:rgba(255,255,255,.055);--tx:#e8e6e3;--tx2:#9b9a97;--tx3:#55544f;--acc:#e8a020;--crit:#ef4444;--high:#f59e0b;--med:#22c55e;--low:#6b7280}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.03;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") repeat;background-size:200px}
::selection{background:rgba(232,160,32,.3)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:0 0}::-webkit-scrollbar-thumb{background:var(--s2);border-radius:3px}

.hdr{position:sticky;top:0;z-index:100;background:rgba(7,8,11,.8);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-bottom:1px solid var(--bd)}
.hdr-in{max-width:780px;margin:0 auto;padding:18px 24px 14px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;letter-spacing:-.03em;color:var(--tx);user-select:none}
.logo .z{color:var(--acc)}.logo .now{color:var(--acc);font-style:italic;font-weight:400}
.hdr-r{display:flex;align-items:center;gap:16px}
.bdg{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600}
.dot{width:7px;height:7px;border-radius:50%;position:relative;flex-shrink:0}
.dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;opacity:.4;animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite}
.dot-c{background:var(--crit)}.dot-c::after{background:var(--crit)}
.dot-h{background:var(--high)}.dot-h::after{background:var(--high)}
.btn-ref{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:7px 14px;color:var(--tx2);font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all .2s}
.btn-ref:hover{background:rgba(255,255,255,.08);color:var(--tx)}
.hdr-meta{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx3);margin-bottom:10px}
.prog{width:100%;height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.prog-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,#ef4444,#dc2626);transition:width 1s linear}

.tabs{max-width:780px;margin:0 auto;padding:16px 24px 0;display:flex;gap:0;border-bottom:1px solid var(--bd)}
.tab{padding:10px 20px;font-size:14px;font-weight:500;color:var(--tx3);cursor:pointer;border:none;background:none;font-family:'Outfit',sans-serif;position:relative;transition:color .25s}
.tab:hover{color:var(--tx2)}
.tab.on{color:var(--tx);font-weight:600}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:10px;right:10px;height:2px;background:var(--acc);border-radius:1px}
.tab .ti{margin-right:6px}
.fr-flag{display:inline-flex;font-size:9px;font-weight:800;font-family:'IBM Plex Mono',monospace;padding:3px 6px;border-radius:3px;background:linear-gradient(90deg,#002395 33%,#fff 33%,#fff 66%,#ED2939 66%);color:#fff;letter-spacing:.06em;line-height:1;text-shadow:0 0 3px rgba(0,0,0,.5)}

.sbar{max-width:780px;margin:16px auto 0;padding:0 24px;display:none}
.sbar.on{display:block}
.sbar-in{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.14);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;animation:pulse 2s ease-in-out infinite}
.spin{width:16px;height:16px;flex-shrink:0;border:2px solid rgba(239,68,68,.2);border-top-color:#ef4444;border-radius:50%;animation:rot .7s linear infinite}
.ebar{max-width:780px;margin:16px auto 0;padding:0 24px;display:none}
.ebar.on{display:block}
.ebar-in{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.18);border-radius:12px;padding:16px 20px}
.e-txt{font-size:14px;color:#f87171;margin-bottom:10px}
.btn-re{background:rgba(239,68,68,.12);border:none;border-radius:6px;padding:7px 16px;color:#f87171;font-size:12px;font-weight:600;cursor:pointer}

.flt-wrap{max-width:780px;margin:0 auto;padding:12px 24px 0;display:none;position:relative}
.flt-wrap.on{display:block}
.flt{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none}
.flt::-webkit-scrollbar{display:none}
.flt-arrow{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(15,17,25,.92);border:1px solid var(--bd);color:var(--tx2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;transition:all .2s;backdrop-filter:blur(8px)}
.flt-arrow:hover{background:rgba(30,33,45,.95);color:var(--tx)}
.flt-arrow.hide{opacity:0;pointer-events:none}
.flt-al{left:12px}.flt-ar{right:12px}
.fbtn{padding:7px 16px;border-radius:20px;border:1px solid var(--bd);background:0 0;color:var(--tx2);font-size:13px;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .25s;white-space:nowrap}
.fbtn:hover{border-color:rgba(255,255,255,.18);color:var(--tx)}
.fbtn.on{background:var(--tx);color:var(--bg);border-color:var(--tx);font-weight:600}

.cnt{max-width:780px;margin:0 auto;padding:8px 24px 0;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--tx3);display:none}
.cnt.on{display:block}

.feed{max-width:780px;margin:0 auto;padding:18px 24px 40px;display:flex;flex-direction:column;gap:12px}

.card{border-radius:14px;padding:20px 22px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);opacity:0;transform:translateY(14px);animation:sUp .5s cubic-bezier(.16,1,.3,1) forwards}
.card:hover{transform:translateY(-2px)!important}
.card.pc{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2)}.card.pc:hover{box-shadow:0 8px 36px rgba(239,68,68,.12)}
.card.ph{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.15)}.card.ph:hover{box-shadow:0 8px 36px rgba(245,158,11,.1)}
.card.pm{background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.1)}.card.pm:hover{box-shadow:0 8px 36px rgba(34,197,94,.08)}
.card.pl{background:transparent;border:1px solid var(--bd)}.card.pl:hover{box-shadow:0 8px 36px rgba(255,255,255,.03)}
.c-row{display:flex;gap:14px;align-items:flex-start}
.c-ico{font-size:24px;flex-shrink:0;margin-top:1px}
.c-body{flex:1;min-width:0}
.c-tags{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.tag{font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:4px}
.tc{color:var(--crit);background:rgba(239,68,68,.12)}.th{color:var(--high);background:rgba(245,158,11,.12)}.tm{color:var(--med);background:rgba(34,197,94,.1)}.tl{color:var(--low);background:rgba(107,114,128,.1)}
.c-cat{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--tx2)}
.c-reg{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--tx3)}
.c-src{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--tx3);margin-left:auto}
.c-ttl{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--tx);margin-bottom:6px;line-height:1.4;letter-spacing:-.01em}
.c-sum{font-size:15px;color:var(--tx2);line-height:1.55}
.c-foot{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
.c-time{display:flex;gap:6px;align-items:center;opacity:.4;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--tx2)}
.c-link{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--acc);text-decoration:none;opacity:.6;transition:opacity .2s;margin-left:auto}
.c-link:hover{opacity:1}

.sep{display:flex;align-items:center;gap:12px;margin:20px 0 8px;opacity:.4}
.sep-line{flex:1;height:1px;background:var(--bd)}
.sep-txt{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}

.skel{height:108px;border-radius:14px;background:linear-gradient(90deg,rgba(255,255,255,.02) 25%,rgba(255,255,255,.05) 50%,rgba(255,255,255,.02) 75%);background-size:200% 100%;animation:shim 1.5s ease-in-out infinite}

.empty{text-align:center;color:var(--tx3);font-size:14px;margin-top:40px;display:none}

@keyframes ping{75%,100%{transform:scale(2.5);opacity:0}}
@keyframes rot{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes shim{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes sUp{to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  .hdr-in,.sbar,.ebar,.flt-wrap,.feed,.tabs,.cnt{padding-left:16px!important;padding-right:16px!important}
  .logo{font-size:23px}.c-ttl{font-size:17px}.card{padding:16px 18px}.tab{padding:8px 14px;font-size:13px}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="hdr-top">
      <div class="logo">New<span class="z">z</span><span class="now">Now</span></div>
      <div class="hdr-r">
        <div id="badges"></div>
        <button class="btn-ref" onclick="go()">↻ Refresh</button>
      </div>
    </div>
    <div class="hdr-meta">
      <span id="meta">Chargement…</span>
      <span id="cd">1:00</span>
    </div>
    <div class="prog"><div class="prog-bar" id="pb"></div></div>
  </div>
</header>

<div class="tabs">
  <button class="tab on" onclick="switchTab('mondial')"><span class="ti">🌍</span>Mondial</button>
  <button class="tab" onclick="switchTab('finance')"><span class="ti">📈</span>Finance</button>
  <button class="tab" onclick="switchTab('france')"><span class="ti fr-flag">FR</span>France</button>
</div>

<div class="sbar" id="sb"><div class="sbar-in"><div class="spin"></div><span id="stxt"></span></div></div>
<div class="ebar" id="eb"><div class="ebar-in"><div class="e-txt" id="etxt"></div><button class="btn-re" onclick="go()">🔄 Réessayer</button></div></div>
<div class="cnt" id="cnt"></div>
<div class="flt-wrap" id="flw">
  <button class="flt-arrow flt-al hide" id="fla" onclick="scrollFlt(-1)">‹</button>
  <div class="flt" id="fl"></div>
  <button class="flt-arrow flt-ar hide" id="fra" onclick="scrollFlt(1)">›</button>
</div>
<main class="feed" id="feed"></main>
<div class="empty" id="emp">Aucun article dans cette catégorie.</div>

<script>
const R=60*1000;
const EP={mondial:"/api/news",finance:"/api/finance",france:"/api/france"};
const P={critical:{l:"URGENT",c:"tc",k:"pc"},high:{l:"IMPORTANT",c:"th",k:"ph"},medium:{l:"NOTABLE",c:"tm",k:"pm"},low:{l:"INFO",c:"tl",k:"pl"}};
const IC_M={"Géopolitique":"🌍","Économie":"📊","Technologie":"⚡","Environnement":"🌱","Société":"👥","Sciences":"🔬","Santé":"🏥","Culture":"🎭","Sport":"⚽","Sécurité":"🛡️","Défense":"🎖️","Énergie":"🔋"};
const IC_F={"Bourse":"📈","Crypto":"₿","Devises":"💱","Matières premières":"🛢️","Entreprises":"🏢","Banques centrales":"🏦","Immobilier":"🏠","Investissement":"💰","FinTech":"⚡","Fiscalité":"📋","Économie":"📊"};
const IC_FR={"Politique":"🏛️","Économie":"📊","Société":"👥","Justice":"⚖️","Culture":"🎭","Sport":"⚽","Santé":"🏥","Éducation":"🎓","Régions":"🗺️","Environnement":"🌱","Tech":"⚡","Sécurité":"🛡️"};
const IC={mondial:IC_M,finance:IC_F,france:IC_FR};

let tab="mondial",data={mondial:[],finance:[],france:[]},filt="all",tl=R;
const $=id=>document.getElementById(id);

function sSt(m){const b=$("sb");if(m){$("stxt").textContent=m;b.classList.add("on")}else b.classList.remove("on")}
function sEr(m){const b=$("eb");if(m){$("etxt").textContent="⚠️ "+m;b.classList.add("on")}else b.classList.remove("on")}
function tAgo(iso){const d=Math.floor((Date.now()-new Date(iso).getTime())/1000);if(d<60)return"à l'instant";if(d<3600)return`il y a ${Math.floor(d/60)} min`;if(d<86400)return`il y a ${Math.floor(d/3600)}h`;return`il y a ${Math.floor(d/86400)}j`}

function groupByTime(arts){
  const g={recent:[],earlier:[],older:[]};
  for(const a of arts){const d=Date.now()-new Date(a.timestamp).getTime();if(d<3600000)g.recent.push(a);else if(d<21600000)g.earlier.push(a);else g.older.push(a)}
  return g;
}

function render(){
  const arts=data[tab]||[],icons=IC[tab]||IC_M;
  const list=filt==="all"?arts:arts.filter(a=>a.category===filt);
  if(!list.length&&arts.length){$("feed").innerHTML="";$("emp").style.display="block";return}
  $("emp").style.display="none";
  const g=groupByTime(list);let html="",idx=0;
  function rg(items,label){
    if(!items.length)return"";
    let h=`<div class="sep"><div class="sep-line"></div><span class="sep-txt">${label}</span><div class="sep-line"></div></div>`;
    for(const a of items){
      const p=P[a.priority]||P.low,ic=icons[a.category]||"📰";
      h+=`<article class="card ${p.k}" style="animation-delay:${idx*.03}s">
        <div class="c-row"><span class="c-ico">${ic}</span><div class="c-body">
          <div class="c-tags"><span class="tag ${p.c}">${p.l}</span><span class="c-cat">${a.category||""}</span>${a.region?`<span class="c-reg">${a.region}</span>`:""}<span class="c-src">${a.source||""}</span></div>
          <div class="c-ttl">${a.title}</div>
          <div class="c-sum">${a.summary||""}</div>
          <div class="c-foot">
            <span class="c-time"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${tAgo(a.timestamp||new Date().toISOString())}</span>
            ${a.link?`<a class="c-link" href="${a.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Lire l'article →</a>`:""}
          </div>
        </div></div></article>`;
      idx++;
    }
    return h;
  }
  html+=rg(g.recent,"Dernière heure");
  html+=rg(g.earlier,"Aujourd'hui");
  html+=rg(g.older,"Plus ancien");
  $("feed").innerHTML=html;
  const cnt=$("cnt");
  if(arts.length>0){cnt.textContent=`${arts.length} articles · dernières 24h`;cnt.classList.add("on")}else cnt.classList.remove("on");
}

function rFilt(){
  const arts=data[tab]||[],icons=IC[tab]||IC_M;
  const cats=["all",...new Set(arts.map(a=>a.category).filter(Boolean))];
  $("fl").innerHTML=cats.map(c=>`<button class="fbtn ${filt===c?"on":""}" onclick="filt='${c}';rFilt();render()">${c==="all"?"Tout":((icons[c]||"")+" "+c)}</button>`).join("");
  $("flw").classList.toggle("on",arts.length>0);
  setTimeout(updateArrows,100);
}
function scrollFlt(dir){$("fl").scrollBy({left:dir*200,behavior:"smooth"});setTimeout(updateArrows,350)}
function updateArrows(){const e=$("fl"),l=$("fla"),r=$("fra");if(!e)return;l.classList.toggle("hide",e.scrollLeft<10);r.classList.toggle("hide",e.scrollLeft>=e.scrollWidth-e.clientWidth-10)}
$("fl").addEventListener("scroll",updateArrows);

function rBdg(){
  const arts=data[tab]||[];
  const cutoff=Date.now()-3600000;
  const recent=arts.filter(a=>new Date(a.timestamp).getTime()>cutoff);
  const cc=recent.filter(a=>a.priority==="critical").length,hc=recent.filter(a=>a.priority==="high").length;
  let h="";
  if(cc)h+=`<span class="bdg"><span class="dot dot-c"></span><span style="color:var(--crit)">${cc}</span></span>`;
  if(hc)h+=`<span class="bdg" style="margin-left:8px"><span class="dot dot-h"></span><span style="color:var(--high)">${hc}</span></span>`;
  $("badges").innerHTML=h;
}

function skel(){$("feed").innerHTML=Array.from({length:6},(_,i)=>`<div class="skel" style="animation-delay:${i*.1}s"></div>`).join("")}

function switchTab(t){
  tab=t;filt="all";
  document.querySelectorAll(".tab").forEach((b,i)=>{b.classList.toggle("on",["mondial","finance","france"][i]===t)});
  if(data[t].length>0){rBdg();rFilt();render()}else fetchFeed(t);
}

async function fetchFeed(t){
  try{
    sEr(null);sSt("📰 Chargement des news…");
    if(!data[t].length)skel();
    const r=await fetch(EP[t]);
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||`Erreur ${r.status}`)}
    const res=await r.json();
    if(res.articles&&res.articles.length>0){
      data[t]=res.articles;
      if(t===tab){
        $("meta").textContent=`Mis à jour ${new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})} · ${data[t].length} articles`;
        sSt(null);sEr(null);rBdg();rFilt();render();
      }
      return;
    }
    throw new Error("Aucun article disponible.");
  }catch(e){
    if(t===tab){sEr(e.message);sSt(null)}
    if(!data[t].length&&t===tab)$("feed").innerHTML="";
  }
}

function go(){tl=R;fetchFeed(tab)}

setInterval(()=>{
  tl=Math.max(0,tl-1000);
  const m=Math.floor(tl/60000),s=String(Math.floor((tl%60000)/1000)).padStart(2,"0");
  $("cd").textContent=`${m}:${s}`;
  $("pb").style.width=`${(tl/R)*100}%`;
},1000);

// Init
fetchFeed("mondial");
setTimeout(()=>fetchFeed("finance"),5000);
setTimeout(()=>fetchFeed("france"),10000);

// Auto refresh every minute
setInterval(()=>{tl=R;fetchFeed(tab)},R);
</script>
</body>
</html>
